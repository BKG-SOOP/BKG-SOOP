<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BKG-SOOP 전적표</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-shell">
    <aside class="sidebar">
      <div class="brand-wrap">
        <div class="brand-dot"></div>
        <div>
          <h1>BKG-SOOP</h1>
          <p class="subtitle">티어별 최근 20전 전적표</p>
        </div>
      </div>

      <div class="side-card summary-card">
        <div class="summary-row">
          <span>전체 인원</span>
          <strong id="totalPlayers">0명</strong>
        </div>
        <div class="summary-row">
          <span>전체 전적</span>
          <strong id="totalGames">0게임</strong>
        </div>

        <div class="divider"></div>

        <div class="small-label">최근 수정</div>
        <div id="updatedAt" class="updated">-</div>

        <div class="small-label">접속 상태</div>
        <div id="connectStatus" class="status-chip">Firebase 연결 중...</div>
      </div>

      <nav class="tier-nav" id="tierNav"></nav>

      <div class="admin-only side-actions hidden">
        <button id="addPlayerBtn" class="side-btn">닉네임 추가</button>
        <button id="resetAllBtn" class="side-btn danger">전체 초기화</button>
      </div>
    </aside>

    <main class="main">
      <div class="hero-panel">
        <div>
          <div class="hero-eyebrow">RANK BOARD</div>
          <h2 class="hero-title">BKG-SOOP 전적 대시보드</h2>
          <p class="hero-desc">
            티어별 유저 전적을 한눈에 확인하고, 관리자 권한으로 전적을 추가 및 관리할 수 있습니다.
          </p>
        </div>
      </div>

      <div class="top-actions">
        <button id="loginBtn" class="blue-btn">관리자 로그인</button>
        <button id="addRecordBtn" class="blue-btn secondary">전적 추가</button>
      </div>

      <section class="board">
        <div id="tiersContainer"></div>
      </section>
    </main>
  </div>

  <div id="modal" class="modal hidden">
    <div class="modal-box">
      <div class="modal-header">
        <h2 id="modalTitle">제목</h2>
        <button id="modalClose" class="close-btn">×</button>
      </div>
      <div id="modalBody"></div>
    </div>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
